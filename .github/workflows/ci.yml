name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  worker:
    name: Worker — Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: worker/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: worker
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: worker
        run: pnpm typecheck

      - name: Test
        working-directory: worker
        run: pnpm test

  # Autonomous-build safety gate (the bug-fix-flow ship gate): a secret must never
  # reach main — it is irreversible once pushed. gitleaks scans the working tree
  # (--no-git, so historical commits don't block PRs); pinned binary because the
  # official action requires a paid license on org-owned repos. Make this a REQUIRED
  # check in branch protection once it's seen green once.
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: gitleaks
        run: |
          # Pinned version — DON'T fetch releases/latest: that unauthenticated
          # api.github.com call randomly 403s on the runner (GitHub API rate-limit),
          # which empties $TAG and fails the step on a flake, not a real secret.
          # Bump deliberately. Release-asset download is unauthenticated-friendly.
          VER=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --no-git --redact --exit-code 1

  # Danger-path guard (autonomous-build ship gate): an autonomous PR that touches a
  # security/money/infra/governance surface must NOT auto-merge — it FAILS this
  # required check so it's held for the operator's manual merge, while a safe code-only
  # PR with everything green merges itself. The single-account-friendly stand-in for
  # CODEOWNERS (which would deadlock when the only reviewer authored the PR). The
  # operator can still merge a held PR via admin override after reviewing.
  danger-path-guard:
    name: Danger-path guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block auto-merge of protected paths
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # 3-dot (merge-base) so we see only what THIS branch changed, not files
          # main advanced past the branch — a 2-dot diff false-positive-holds a behind
          # branch on main's newer protected paths (it spuriously held PR #140).
          changed="$(git diff --name-only "$base...$head")"
          echo "Changed files:"; echo "$changed"
          deny='^(supabase/migrations/|supabase/tests/|src/lib/auth/|proxy\.ts$|middleware\.ts$|src/lib/db/admin\.ts|src/lib/accounting/|src/lib/labor/|src/lib/notifications/|src/app/api/notifications/|worker/|\.github/|\.claude/|CLAUDE\.md|docs/decisions/|docs/policies/|CODEOWNERS|package\.json|pnpm-lock\.yaml|\.env)'
          hits="$(echo "$changed" | grep -E "$deny" || true)"
          if [ -n "$hits" ]; then
            echo "::error::Protected path(s) touched — this PR needs operator review and cannot auto-merge:"
            echo "$hits"
            exit 1
          fi
          echo "OK — no protected paths touched; safe to auto-merge."

  # pgTAP — Tier C elevated to a REQUIRED PR gate (ADR 0081, superseding ADR 0048's
  # manual-only stance). Runs on every PR so the RLS / append-only / money
  # invariants the pgTAP suite encodes are enforced in CI, not just locally.
  #
  # It hits the ONE shared remote DB, so the job SERIALIZES on a global concurrency
  # group — only one pgTAP run touches the DB at a time; concurrent PR runs queue
  # (cancel-in-progress: false). Tests are transactional (begin…rollback) and the
  # runner refuses any file without a closing ROLLBACK (ADR 0006), so a run leaves
  # NO residue — which is why the shared DB is safe here without per-PR preview
  # branches. Pre-existing reds are pinned in supabase/tests/known-red.json; the
  # runner fails the check on ANY other red. Needs the SUPABASE_ACCESS_TOKEN repo
  # secret (the project ref is non-secret, in package.json).
  db-test:
    name: Database (pgTAP)
    runs-on: ubuntu-latest
    concurrency:
      group: pgtap-shared-db
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Link Supabase CLI
        run: pnpm db:link
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: pgTAP
        run: pnpm db:test
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # Build (ADR 0081): `next build` catches compile/build breaks that lint +
  # typecheck miss — CI could previously pass while the Vercel production build
  # failed. Secret-free: env.ts / env.server.ts validate + throw on missing vars at
  # import, so the build needs the full env shape, but these are dummy build-time
  # placeholders (mirroring vitest.config.ts), never real secrets. App routes are
  # dynamic (cookies()-driven), so the build compiles without reaching Supabase.
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: next build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          LINE_CHANNEL_ID: test-line-channel-id
          LINE_CHANNEL_SECRET: test-line-channel-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
