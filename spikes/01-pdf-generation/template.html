<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{TITLE}}</title>
    <style>
      @page {
        size: Letter;
        margin: 0.5in;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: #111;
        font-size: 9pt;
        line-height: 1.35;
      }
      header.report-header {
        border-bottom: 2px solid #111;
        padding-bottom: 10px;
        margin-bottom: 14px;
      }
      header.report-header h1 {
        margin: 0;
        font-size: 18pt;
        font-weight: 700;
      }
      header.report-header .meta {
        color: #555;
        font-size: 8.5pt;
        margin-top: 4px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .card {
        border: 1px solid #d4d4d4;
        border-radius: 3px;
        overflow: hidden;
        break-inside: avoid;
        page-break-inside: avoid;
        background: #fff;
      }
      .card .img-wrap {
        width: 100%;
        aspect-ratio: 4 / 3;
        background: #f3f3f3;
      }
      .card .img-wrap img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .card .body {
        padding: 5px 7px 7px;
      }
      .card .phase {
        display: inline-block;
        font-size: 6.5pt;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #fff;
        padding: 1px 6px;
        border-radius: 2px;
      }
      .card .phase.before {
        background: #6b7280;
      }
      .card .phase.during {
        background: #2563eb;
      }
      .card .phase.after {
        background: #16a34a;
      }
      .card .caption {
        margin: 4px 0 2px;
        font-size: 8.5pt;
        font-weight: 600;
        line-height: 1.25;
      }
      .card .ts {
        font-size: 7pt;
        color: #666;
        font-variant-numeric: tabular-nums;
      }
      footer.report-footer {
        margin-top: 14px;
        padding-top: 6px;
        border-top: 1px solid #ddd;
        text-align: center;
        font-size: 7.5pt;
        color: #888;
      }
    </style>
  </head>
  <body>
    <header class="report-header">
      <h1>{{TITLE}}</h1>
      <div class="meta">{{PHOTO_COUNT}} photos · generated {{GENERATED_AT}}</div>
    </header>
    <main class="grid">
      {{CARDS}}
    </main>
    <footer class="report-footer">{{TITLE}} · {{GENERATED_AT}}</footer>
  </body>
</html>
